<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <title>Login IZI Energia</title>
      <!-- Favicons -->
  <link href="assets/img/WhatsApp_Image_2023-09-25_at_09.58.25-removebg-preview(1).png" rel="icon">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <!-- Fontawesome CDN Link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   </head>
<body>

  <div class="container">
    <input type="checkbox" id="flip">
    <div class="cover">
      <div class="front">
        <img src="assets/img/DreamShaper_v7_painel_solar_sustentabilidade_3.jpg" alt="">
      </div>
      <div class="back">
      </div>
    </div>
    <div class="forms">
        <div class="form-content">
          <div class="login-form">
            <div class="title">Login</div>
          <form action="#">
            <div class="input-boxes">
              <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="text" placeholder="E-mail" required>
              </div>
              <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Senha" required>
              </div>
              <div class="text"><a href="#">Esqueceu a Senha?</a></div>
              <div class="button input-box">
                <input type="submit" value="Entrar">
              </div>
              <div class="text sign-up-text">Ainda não possui uma conta? <label for="flip">Cadastramento</label></div>
            </div>
        </form>
      </div>
        <div class="signup-form">
          <div class="title">Cadastramento</div>
        <form action="#">
            <div class="input-boxes">
              <div class="input-box">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="Nome" required>
              </div>
              <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="text" placeholder="E-mail" required>
              </div>
              <div class="input-box">
                <i class="fas fa-phone"></i>
                <input type="text" placeholder="Telefone de Contato" required>
              </div>
              <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Senha" required>
              </div>
              <div class="button input-box">
                <input type="submit" value="Entrar">
              </div>
              <div class="text sign-up-text">Já possui uma conta? <label for="flip">Faça Login</label></div>
            </div>
      </form>
    </div>
    </div>
    </div>
  </div>
</body>
